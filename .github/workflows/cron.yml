name: Periodic Task

on:
    schedule:
        - cron: "*/10 * * * *"

jobs:
    run-task:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - name: Run periodic task
              run: |
                  echo "Scheduled task executed at $(date)"
                  echo "This job runs every 10 minutes"
